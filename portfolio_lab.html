<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QQQ Trader</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#090d12;
  --surface:#0f1720;
  --border:#18242f;
  --border2:#22333f;
  --text:#cdd9e5;
  --muted:#4d6475;
  --dim:#2a3d4a;
  --green:#26a65b;
  --red:#c0392b;
  --amber:#d68910;
  --blue:#2475bd;
  --mono:"SF Mono","Cascadia Code","Fira Code",ui-monospace,monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,sans-serif;font-size:13px;overflow:hidden}
button{cursor:pointer;font:inherit;background:none;border:none;color:inherit}
input{font:inherit}

/* ── APP SHELL ─────────────────────────────────────────────────────────── */
#app{height:100vh;display:grid;grid-template-rows:48px auto 1fr 48px;overflow:hidden}

/* ── TOP BAR ───────────────────────────────────────────────────────────── */
#topbar{
  display:flex;align-items:stretch;
  border-bottom:1px solid var(--border);
  overflow-x:auto;overflow-y:hidden;
  scrollbar-width:none;
}
#topbar::-webkit-scrollbar{display:none}
.tb-name{
  display:flex;align-items:center;
  padding:0 18px 0 16px;
  font-size:13px;font-weight:800;letter-spacing:-.02em;
  border-right:1px solid var(--border);flex-shrink:0
}
.tb-chip{
  display:flex;align-items:center;gap:7px;
  padding:0 14px;font-size:11px;font-weight:600;color:var(--muted);
  border-right:1px solid var(--border);white-space:nowrap;flex-shrink:0;
  letter-spacing:.02em;text-transform:uppercase
}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-green{background:var(--green);box-shadow:0 0 5px rgba(38,166,91,.6)}
.dot-red{background:var(--red)}
.dot-amber{background:var(--amber)}
.dot-blue{background:var(--blue)}
.dot-dim{background:var(--dim)}
.tb-sep{flex:1;min-width:12px}
.tb-stat{
  display:flex;align-items:center;
  padding:0 14px;font-family:var(--mono);font-size:12px;font-weight:600;
  border-left:1px solid var(--border);white-space:nowrap;flex-shrink:0
}
.tb-stat .lbl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-right:6px}
.tb-stat.big .val{font-size:15px;font-weight:800}
#tb-pause{
  margin:9px 12px;height:30px;padding:0 12px;border-radius:5px;
  border:1px solid var(--border2);color:var(--muted);
  font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;flex-shrink:0
}
#tb-pause:hover{border-color:var(--blue);color:var(--blue)}
#tb-pause.paused{border-color:var(--amber);color:var(--amber)}

/* ── POSITIONS ─────────────────────────────────────────────────────────── */
#pos-bar{
  display:flex;align-items:center;
  padding:0 16px;height:32px;
  border-bottom:1px solid var(--border);
  font-size:10px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.08em;gap:10px;flex-shrink:0
}
#pos-bar-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.tag{
  display:inline-flex;align-items:center;height:18px;padding:0 7px;border-radius:3px;
  font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
  border:1px solid var(--border2);color:var(--muted);background:var(--surface)
}
.tag.good{color:var(--green);border-color:rgba(38,166,91,.3);background:rgba(38,166,91,.08)}
.tag.warn{color:var(--amber);border-color:rgba(214,137,16,.3);background:rgba(214,137,16,.08)}
.tag.bad{color:var(--red);border-color:rgba(192,57,43,.3);background:rgba(192,57,43,.08)}
.tag.call{color:#5dade2;border-color:rgba(93,173,226,.3);background:rgba(93,173,226,.08)}
.tag.put{color:var(--red);border-color:rgba(192,57,43,.3);background:rgba(192,57,43,.08)}

#pos-section{overflow-x:auto;overflow-y:hidden}
#pos-table{width:100%;border-collapse:collapse;min-width:560px}
#pos-table th{
  padding:0 16px 0;height:28px;
  font-size:9px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;
  text-align:left;border-bottom:1px solid var(--border);white-space:nowrap
}
#pos-table td{
  padding:11px 16px;border-bottom:1px solid var(--border);
  vertical-align:middle;white-space:nowrap
}
#pos-table tr:last-child td{border-bottom:none}
#pos-table tbody tr:hover td{background:rgba(255,255,255,.016)}
.sym{font-family:var(--mono);font-weight:800;font-size:14px;cursor:pointer}
.sym:hover{color:var(--blue)}
.sub{font-size:10px;color:var(--muted);margin-top:2px}
.mono{font-family:var(--mono)}
.pos-green{color:var(--green)}
.pos-red{color:var(--red)}

/* ── FEED ──────────────────────────────────────────────────────────────── */
#feed{display:flex;flex-direction:column;min-height:0;overflow:hidden;border-top:1px solid var(--border)}
#feed-hdr{
  display:flex;align-items:center;padding:0 16px;height:32px;flex-shrink:0;
  font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;
  border-bottom:1px solid var(--border)
}
#feed-hdr-right{margin-left:auto;display:flex;gap:8px}
.feed-action{
  height:22px;padding:0 10px;border-radius:4px;border:1px solid var(--border2);
  font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.04em;text-transform:uppercase
}
.feed-action:hover{border-color:var(--blue);color:var(--blue)}
#feed-items{flex:1;overflow-y:auto;display:flex;flex-direction:column-reverse}
#feed-inner{display:flex;flex-direction:column}
.fi{
  display:grid;grid-template-columns:80px 52px 1fr;
  align-items:baseline;gap:0;
  padding:8px 16px;border-bottom:1px solid var(--border)
}
.fi:last-child{border-bottom:none}
.fi-ts{font-size:10px;color:var(--dim);font-family:var(--mono)}
.fi-who{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.fi-msg{font-size:12px;line-height:1.5;color:var(--text)}
.fi.you .fi-who{color:var(--blue)}
.fi.you .fi-msg{color:var(--text)}
.fi.sys .fi-msg{color:var(--muted)}
.fi-msg b{font-weight:700;color:var(--text)}
#typing-row{display:none;padding:8px 16px;grid-template-columns:80px 52px 1fr;align-items:center;gap:0;border-bottom:1px solid var(--border)}
#typing-row.vis{display:grid}
.typing-dots span{
  display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--dim);margin:0 2px;
  animation:bop .8s infinite
}
.typing-dots span:nth-child(2){animation-delay:.14s}
.typing-dots span:nth-child(3){animation-delay:.28s}
@keyframes bop{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}

/* ── INPUT ─────────────────────────────────────────────────────────────── */
#input-row{
  display:flex;align-items:center;gap:10px;
  padding:0 16px;height:48px;flex-shrink:0;
  border-top:1px solid var(--border);background:var(--bg)
}
#msg-input{
  flex:1;background:none;border:none;outline:none;color:var(--text);font-size:13px
}
#msg-input::placeholder{color:var(--dim)}
#send-btn{
  width:30px;height:30px;border-radius:5px;background:var(--blue);color:#fff;
  font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0
}
#send-btn:disabled{opacity:.3;cursor:default}

/* ── ALERT BANNER ─────────────────────────────────────────────────────── */
#alert-banner{display:none;flex-direction:column;gap:6px;padding:8px 16px}
.alert-item{
  display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:5px;
  font-size:12px;line-height:1.4;border:1px solid var(--border2);background:var(--surface)
}
.alert-item.critical{border-color:rgba(192,57,43,.4);background:rgba(192,57,43,.08)}
.alert-item.warning{border-color:rgba(214,137,16,.4);background:rgba(214,137,16,.08)}
.alert-dismiss{margin-left:auto;font-size:14px;color:var(--muted);flex-shrink:0}

/* ── STOCK MODAL ───────────────────────────────────────────────────────── */
#stock-modal{display:none;position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.7);align-items:center;justify-content:center}
#stock-modal.open{display:flex}
#smd-box{background:var(--surface);border:1px solid var(--border2);border-radius:8px;width:min(500px,94vw);max-height:85vh;display:flex;flex-direction:column;overflow:hidden}
#smd-hdr{display:flex;align-items:flex-start;gap:12px;padding:16px 18px 12px;border-bottom:1px solid var(--border)}
#smd-sym{font-size:20px;font-weight:800;font-family:var(--mono)}
#smd-meta{font-size:11px;color:var(--muted);margin-top:2px}
#smd-price{font-size:17px;font-weight:700;font-family:var(--mono);text-align:right}
#smd-chg{font-size:11px;text-align:right;margin-top:2px}
#smd-close{margin-left:6px;font-size:18px;color:var(--muted)}
#smd-body{overflow-y:auto;flex:1}
.smd-sec{padding:14px 18px;border-bottom:1px solid var(--border)}
.smd-sec:last-child{border-bottom:none}
.smd-lbl{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.smd-ind-row{display:grid;grid-template-columns:8px 60px 1fr auto;align-items:center;gap:8px;padding:4px 0}
.smd-dot{width:7px;height:7px;border-radius:50%}
.bullish{background:var(--green)}.bearish{background:var(--red)}.neutral{background:var(--dim)}
.smd-ind-name{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase}
.smd-ind-label{font-size:12px}
.smd-pts{font-size:11px;font-family:var(--mono);font-weight:700}
.pts-full{color:var(--green)}.pts-zero{color:var(--dim)}.pts-partial{color:var(--amber)}
.smd-news-item{padding:8px 0;border-bottom:1px solid var(--border)}
.smd-news-item:last-child{border-bottom:none}
.smd-news-headline{font-size:12px;line-height:1.4;margin-bottom:3px}
.smd-news-meta{display:flex;gap:8px;font-size:10px;color:var(--dim)}
.smd-news-link{margin-left:auto;font-size:10px;color:var(--blue);text-decoration:none;font-weight:600}

/* ── BACKTEST MODAL ────────────────────────────────────────────────────── */
#bt-panel{display:none;position:fixed;inset:0;z-index:8500;background:rgba(0,0,0,.75);align-items:center;justify-content:center}
#bt-panel.open{display:flex}
#bt-box{background:var(--surface);border:1px solid var(--border2);border-radius:8px;width:min(760px,96vw);max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
#bt-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
#bt-hdr-title{font-size:14px;font-weight:700}
#bt-close{font-size:18px;color:var(--muted)}
#bt-content{flex:1;overflow-y:auto;min-height:200px;padding:16px 18px;font-size:12px;line-height:1.6;color:var(--muted)}
.bt-run-btn{background:var(--blue);color:#fff;border:none;border-radius:5px;padding:7px 14px;font-size:11px;font-weight:700}
.bt-spinner{width:26px;height:26px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:20px auto}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:820px){
  .hide-sm{display:none!important}
  #pos-bar,.tag{font-size:9px}
}
</style>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <header id="topbar">
    <span class="tb-name">QQQ Autopilot</span>
    <div class="t-chip tb-chip" id="tb-market"><span class="dot dot-dim" id="tb-mkt-dot"></span><span id="tb-mkt-txt">—</span></div>
    <div class="t-chip tb-chip" id="tb-regime"><span class="dot dot-dim" id="tb-rgm-dot"></span><span id="tb-rgm-txt">—</span></div>
    <div class="t-chip tb-chip hide-sm" id="tb-auto"><span class="dot dot-dim" id="tb-auto-dot"></span><span id="tb-auto-txt">—</span></div>
    <div class="tb-sep"></div>
    <div class="tb-stat big"><span class="lbl">Equity</span><span class="val" id="tb-equity">—</span></div>
    <div class="tb-stat hide-sm"><span class="lbl">P&amp;L</span><span class="val" id="tb-pnl">—</span></div>
    <div class="tb-stat hide-sm"><span class="lbl" id="tb-qqq-lbl">vs QQQ</span><span class="val" id="tb-qqq">—</span></div>
    <div class="tb-stat hide-sm"><span class="lbl">Exposure</span><span class="val" id="tb-exp">—</span></div>
    <div class="tb-stat hide-sm"><span class="lbl">Cash</span><span class="val" id="tb-cash">—</span></div>
    <div class="tb-stat hide-sm"><span class="lbl">Week</span><span class="val" id="tb-week">—</span></div>
    <div class="tb-stat hide-sm"><span class="lbl">QTD</span><span class="val" id="tb-qtd">—</span></div>
    <div class="tb-stat hide-sm"><span class="lbl">YTD</span><span class="val" id="tb-ytd">—</span></div>
    <button id="tb-pause" onclick="toggleTrading()">Pause</button>
  </header>

  <!-- POSITIONS -->
  <div>
    <div id="pos-bar">
      Positions
      <div id="pos-bar-right">
        <span class="tag" id="pos-risk-tag">—</span>
        <span id="pos-sub" style="color:var(--dim);font-size:10px"></span>
      </div>
    </div>
    <div id="alert-banner"></div>
    <section id="pos-section">
      <table id="pos-table">
        <thead>
          <tr>
            <th>Symbol</th><th>Qty</th><th>Value</th><th>Weight</th><th>P&amp;L</th><th>Type</th><th>Note</th>
          </tr>
        </thead>
        <tbody id="pos-body">
          <tr><td colspan="7" style="color:var(--muted);padding:14px 16px">Loading…</td></tr>
        </tbody>
      </table>
    </section>
  </div>

  <!-- ACTIVITY FEED -->
  <section id="feed">
    <div id="feed-hdr">
      Activity
    </div>
    <div id="feed-items">
      <div id="feed-inner"></div>
      <div id="typing-row">
        <span class="fi-ts" id="typing-ts"></span>
        <span class="fi-who">Agent</span>
        <span class="typing-dots"><span></span><span></span><span></span></span>
      </div>
    </div>
  </section>

  <!-- INPUT -->
  <div id="input-row">
    <input id="msg-input" type="text" placeholder="Ask the agent anything…" autocomplete="off">
    <button id="send-btn" onclick="handleSend()">▶</button>
  </div>

</div>

<!-- Stock detail modal -->
<div id="stock-modal" onclick="if(event.target===this)closeStockModal()">
  <div id="smd-box">
    <div id="smd-hdr">
      <div style="flex:1"><div id="smd-sym">—</div><div id="smd-meta">—</div></div>
      <div><div id="smd-price">—</div><div id="smd-chg">—</div></div>
      <button id="smd-close" onclick="closeStockModal()">✕</button>
    </div>
    <div id="smd-body">
      <div class="smd-sec" id="smd-breakdown"></div>
      <div class="smd-sec" id="smd-news" style="display:none"></div>
      <div class="smd-sec" id="smd-reasons" style="display:none"></div>
    </div>
  </div>
</div>

<!-- Backtest modal -->
<div id="bt-panel" onclick="if(event.target===this)closeBt()">
  <div id="bt-box">
    <div id="bt-hdr">
      <span id="bt-hdr-title">Walk-Forward Backtest</span>
      <button id="bt-close" onclick="closeBt()">✕</button>
    </div>
    <div id="bt-content">
      <div style="margin-bottom:12px;color:var(--text)">Run a walk-forward replay of the current strategy model against historical data.</div>
      <button class="bt-run-btn" onclick="runBacktest()">Run Backtest</button>
      <div id="bt-result" style="margin-top:16px"></div>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
const BASE = '';
const API_KEY = '';
const apiFetch = (path, opts={}) => fetch(`${BASE}${path}`, {
  ...opts, headers:{'X-API-Key':API_KEY,...(opts.headers||{})}
});
const apiJson = async (path, opts={}) => {
  const r = await apiFetch(path, opts);
  const d = await r.json();
  if (!r.ok) throw new Error(d.error||`HTTP ${r.status}`);
  return d;
};
const $ = id => document.getElementById(id);

// ─── STATE ─────────────────────────────────────────────────────────────────
let _paused = false;
let _marketOpen = false;
let _latestOverview = {};
let _dismissedAlerts = new Set();
let _initialized = false;

// ─── FORMATTERS ────────────────────────────────────────────────────────────
const fmt$ = (n, d=0) => n==null||isNaN(n) ? '—' : '$'+Math.abs(+n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtPnl = (n, d=0) => n==null||isNaN(n) ? '—' : `${+n>=0?'+':'-'}$${Math.abs(+n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d})}`;
const fmtPct = (n, d=1) => n==null||isNaN(n) ? '—' : `${+n>=0?'+':''}${(+n).toFixed(d)}%`;
const esc = s => String(s??'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
const now12 = () => new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});
const shortTxt = (s,n=80) => { const t=String(s||'').replace(/\s+/g,' ').trim(); return t.length>n?t.slice(0,n-1)+'…':(t||'—'); };
const isOptSym = s => /^[A-Z]{1,6}\d{6}[CP]\d{8}$/.test(String(s||'').toUpperCase().trim());

function parseOptSym(sym) {
  const m = String(sym||'').toUpperCase().trim().match(/^([A-Z]+)(\d{2})(\d{2})(\d{2})([CP])(\d{8})$/);
  if (!m) return null;
  const [,root,yy,mm,dd,type,strikePad] = m;
  return {root, type, strike:parseInt(strikePad,10)/1000, expiry:`20${yy}-${mm}-${dd}`};
}

// ─── TOP BAR ───────────────────────────────────────────────────────────────
function renderTopbar(data) {
  const acct = data.account||{};
  const acctg = data.accounting||{};
  const bench = data.benchmark||{};
  const clock = data.clock||{};
  const regime = ((data.live_scores||{}).regime||'—').toUpperCase();
  const equity = +acct.equity||0;
  const lastEq = +(acct.adjusted_last_equity||acct.last_equity||equity);
  const pnl = equity - lastEq;
  const gap = +(bench.bot_vs_best||0);
  const gross = +(acctg.gross_exposure_pct||0);
  const cash = +(acct.cash||0);
  _marketOpen = !!clock.is_open;

  // market
  $('tb-mkt-dot').className = 'dot '+(_marketOpen?'dot-green':'dot-dim');
  $('tb-mkt-txt').textContent = _marketOpen ? 'Market open' : 'Market closed';

  // regime
  const rgmCls = regime==='BULL'?'dot-green':regime==='BEAR'?'dot-red':'dot-amber';
  $('tb-rgm-dot').className = 'dot '+rgmCls;
  $('tb-rgm-txt').textContent = regime;

  // auto
  const autoCls = _paused?'dot-amber':(_marketOpen?'dot-green':'dot-blue');
  const autoTxt = _paused?'Paused':(_marketOpen?'Armed':'Waiting');
  $('tb-auto-dot').className = 'dot '+autoCls;
  $('tb-auto-txt').textContent = autoTxt;
  $('tb-pause').className = _paused ? 'paused' : '';
  $('tb-pause').textContent = _paused ? 'Resume' : 'Pause';

  // numbers
  $('tb-equity').textContent = fmt$(equity);
  $('tb-pnl').textContent = fmtPnl(pnl);
  $('tb-pnl').className = 'val '+(pnl>=0?'pos-green':'pos-red');
  $('tb-qqq').textContent = bench.ok ? fmtPnl(gap) : '—';
  $('tb-qqq').className = 'val '+(gap>=0?'pos-green':'pos-red');
  $('tb-qqq-lbl').textContent = 'vs '+(bench.best_symbol||'QQQ');
  $('tb-exp').textContent = gross.toFixed(1)+'%';
  $('tb-cash').textContent = fmt$(cash);
}

// ─── POSITIONS TABLE ───────────────────────────────────────────────────────
function renderPositions(data) {
  const acctg = data.accounting||{};
  const allPositions = acctg.positions||[];
  const exits = {};
  for (const r of (acctg.exit_recommendations||[])) {
    const s = String(r.symbol||r.ticker||'').toUpperCase();
    if (s) exits[s] = r;
  }

  // Build rows: equity + option positions from the same array
  const eqPos = allPositions.filter(p => !isOptSym(p.symbol));
  const optPos = allPositions.filter(p => isOptSym(p.symbol));

  const riskState = acctg.risk_state||{};
  const rs = riskState.status||'ok';
  const rsMsg = riskState.message||'';
  const rtag = $('pos-risk-tag');
  const rLabel = rs==='breach'?'BREACH':rs==='warning'?'WARNING':rs==='review'?'REVIEW':rs==='recovery'?'RECOVERY':'OK';
  rtag.textContent = rLabel;
  rtag.title = rsMsg;
  rtag.className = 'tag '+(rs==='breach'?'bad':rs==='warning'||rs==='review'||rs==='recovery'?'warn':'good');
  // Show risk reason inline if not normal
  const rDate = (acctg.next_rebalance_date||'').slice(0,10);
  $('pos-sub').textContent = rsMsg && rs !== 'normal' && rs !== 'ok' && rs !== 'research'
    ? rsMsg
    : `next rebalance ${rDate||'—'}`;

  if (!allPositions.length) {
    $('pos-body').innerHTML = '<tr><td colspan="7" style="color:var(--muted);padding:14px 16px">No open positions. System is in cash.</td></tr>';
    return;
  }

  // Compute covered call coverage for QQQ
  // side field comes from accounting rows: "LONG" or "SHORT"
  const qqqEq = eqPos.find(p => String(p.symbol||'').toUpperCase() === 'QQQ');
  const qqqShares = qqqEq ? Math.floor(+(qqqEq.qty||qqqEq.quantity||qqqEq.shares||0)) : 0;
  const qqqLots = Math.floor(qqqShares / 100);
  // A covered call = SHORT call. A LONG call is a directional bet, not a covered write.
  const coveredCallContracts = optPos.filter(p => {
    const parsed = parseOptSym(p.symbol);
    const side = String(p.side||'').toUpperCase();
    return parsed && parsed.root === 'QQQ' && parsed.type === 'C' && side === 'SHORT';
  }).reduce((n, p) => n + Math.abs(+(p.qty||p.quantity||p.contracts||1)), 0);
  // Long QQQ calls = directional bets (not covered writes)
  const longCallContracts = optPos.filter(p => {
    const parsed = parseOptSym(p.symbol);
    const side = String(p.side||'LONG').toUpperCase();
    return parsed && parsed.root === 'QQQ' && parsed.type === 'C' && side !== 'SHORT';
  }).reduce((n, p) => n + Math.abs(+(p.qty||p.quantity||p.contracts||1)), 0);

  const rows = [];

  for (const pos of eqPos) {
    const sym = String(pos.symbol||'?').toUpperCase();
    const qty = +(pos.qty||pos.quantity||pos.shares||pos.num_shares||0);
    const val = +(pos.current_value||pos.market_value||0);
    const wt = +(pos.current_weight_pct||pos.weight_pct||0);
    const pnl = +(pos.unrealized_pnl||0);
    const pnlPct = +(pos.unrealized_pnl_pct||0);
    const ex = exits[sym];
    // For QQQ, add coverage note
    let note = ex ? shortTxt(ex.reason||ex.summary||'Exit candidate',56) : 'Holding';
    let qtyExtra = '';
    if (sym === 'QQQ' && qqqLots > 0) {
      const covered = coveredCallContracts;
      const uncovered = Math.max(0, qqqLots - covered);
      const lotWord = qqqLots === 1 ? 'lot' : 'lots';
      const extras = [];
      if (covered > 0) extras.push(`<span style="color:var(--amber)">${covered} covered call${covered>1?'s':''}</span>`);
      if (longCallContracts > 0) extras.push(`<span style="color:var(--blue)">${longCallContracts} long call${longCallContracts>1?'s':''}</span>`);
      qtyExtra = `<div style="font-size:10px;color:var(--muted);margin-top:2px">${qqqLots} ${lotWord}${extras.length?' · '+extras.join(' · '):''}</div>`;
      if (covered === 0 && longCallContracts > 0) {
        note = `${qqqLots} ${lotWord}, ${longCallContracts} long call — no covered writes yet`;
      } else if (covered > 0 && uncovered > 0) {
        note = `${uncovered} lot${uncovered>1?'s':''} uncovered — engine may write calls`;
      } else if (covered === qqqLots) {
        note = `All ${qqqLots} ${lotWord} covered`;
      } else {
        note = `${qqqLots} ${lotWord}, no covered writes`;
      }
    }
    const qtyStr = qty > 0 ? Math.round(qty).toLocaleString() : '—';
    rows.push(`<tr>
      <td><div class="sym" onclick="showStockDetail('${sym}')">${sym}</div>${qtyExtra}</td>
      <td class="mono" style="color:var(--muted)">${qtyStr}</td>
      <td class="mono">${fmt$(val)}</td>
      <td class="mono">${wt.toFixed(1)}%</td>
      <td class="mono ${pnl>=0?'pos-green':'pos-red'}">${fmtPnl(pnl)} <span style="font-size:10px;opacity:.7">${fmtPct(pnlPct,2)}</span></td>
      <td><span class="tag good">Stock</span></td>
      <td style="font-size:11px;color:var(--muted)">${esc(note)}</td>
    </tr>`);
  }

  for (const pos of optPos) {
    const sym = String(pos.symbol||'?').toUpperCase();
    const qty = Math.abs(+(pos.qty||pos.quantity||pos.contracts||1));
    const val = +(pos.current_value||pos.market_value||0);
    const wt = +(pos.current_weight_pct||pos.weight_pct||0);
    const pnl = +(pos.unrealized_pnl||0);
    const pnlPct = +(pos.unrealized_pnl_pct||0);
    const parsed = parseOptSym(sym);
    const optSide = String(pos.side||'LONG').toUpperCase();
    let typeTag = '<span class="tag">Opt</span>';
    if (parsed) {
      if (parsed.type === 'C') {
        typeTag = optSide === 'SHORT'
          ? '<span class="tag warn">Covered</span>'
          : '<span class="tag call">Long Call</span>';
      } else {
        typeTag = optSide === 'SHORT'
          ? '<span class="tag bad">Short Put</span>'
          : '<span class="tag put">Put Hedge</span>';
      }
    }
    const note = parsed ? `${parsed.root} $${parsed.strike} · exp ${parsed.expiry}` : sym;
    rows.push(`<tr>
      <td><div class="sym" style="font-size:11px;cursor:default;letter-spacing:-.01em">${sym}</div></td>
      <td class="mono" style="color:var(--muted)">${qty} ct</td>
      <td class="mono">${fmt$(val)}</td>
      <td class="mono">${wt>0?wt.toFixed(1)+'%':'—'}</td>
      <td class="mono ${pnl>=0?'pos-green':'pos-red'}">${fmtPnl(pnl)} <span style="font-size:10px;opacity:.7">${fmtPct(pnlPct,2)}</span></td>
      <td>${typeTag}</td>
      <td style="font-size:11px;color:var(--muted)">${esc(note)}</td>
    </tr>`);
  }

  $('pos-body').innerHTML = rows.join('');
}

// ─── ALERT BANNER ──────────────────────────────────────────────────────────
function renderAlerts(alerts) {
  const banner = $('alert-banner');
  const active = (alerts||[]).filter(a => !_dismissedAlerts.has(a.code));
  if (!active.length) { banner.style.display='none'; return; }
  banner.style.display='flex';
  banner.innerHTML = active.map(a=>`
    <div class="alert-item ${a.level||''}">
      <span style="font-size:13px">${a.level==='critical'?'🔴':a.level==='warning'?'🟡':'ℹ️'}</span>
      <span style="flex:1">${esc(a.message||a.code)}</span>
      <button class="alert-dismiss" onclick="_dismissedAlerts.add('${esc(a.code)}');renderAlerts([...window._lastAlerts||[]])">✕</button>
    </div>`).join('');
  window._lastAlerts = alerts;
}

// ─── FEED ──────────────────────────────────────────────────────────────────
const feedInner = () => $('feed-inner');
const typingRow = () => $('typing-row');
const FEED_KEY  = 'qqq_feed_v3';
const FEED_MAX  = 150;

function _persistFeed() {
  try {
    const items = [...feedInner().querySelectorAll('.fi')].slice(-FEED_MAX).map(el => ({
      h: el.querySelector('.fi-msg')?.innerHTML || '',
      r: el.classList.contains('you') ? 'you' : el.classList.contains('sys') ? 'sys' : 'agent',
      t: el.querySelector('.fi-ts')?.textContent || '',
    }));
    localStorage.setItem(FEED_KEY, JSON.stringify(items));
  } catch(e) {}
}

let _feedRestored = false;

function restoreFeed() {
  try {
    const stored = JSON.parse(localStorage.getItem(FEED_KEY) || '[]');
    if (!stored.length) return;
    for (const item of stored) {
      const who = item.r === 'you' ? 'You' : item.r === 'sys' ? 'System' : 'Agent';
      const el  = document.createElement('div');
      el.className = 'fi ' + (item.r === 'agent' ? '' : item.r);
      el.innerHTML  = `<span class="fi-ts">${item.t}</span><span class="fi-who">${who}</span><div class="fi-msg">${item.h}</div>`;
      feedInner().appendChild(el);
    }
    const fi = $('feed-items');
    fi.scrollTop = fi.scrollHeight;
    _feedRestored = true;  // skip redundant init messages on reload
  } catch(e) {}
}

function addFeedItem(html, role='agent', ts=null) {
  const t = ts || now12();
  const cls = role==='you'?'you':(role==='sys'?'sys':'');
  const who = role==='you'?'You':(role==='sys'?'System':'Agent');
  const el = document.createElement('div');
  el.className = 'fi '+cls;
  el.innerHTML = `<span class="fi-ts">${t}</span><span class="fi-who">${who}</span><div class="fi-msg">${html}</div>`;
  feedInner().appendChild(el);
  const fi = $('feed-items');
  fi.scrollTop = fi.scrollHeight;
  _persistFeed();
}

function showTyping() {
  $('typing-ts').textContent = now12();
  typingRow().classList.add('vis');
  const fi = $('feed-items');
  fi.scrollTop = fi.scrollHeight;
}
function hideTyping() { typingRow().classList.remove('vis'); }

// ─── PERF BAR ──────────────────────────────────────────────────────────────
const OPT_RE = /^[A-Z]{1,6}\d{6}[CP]\d{8}$/;
let _histEquity = null;

function fmtPerf(dollar, pct) {
  const cls = dollar >= 0 ? 'pos-green' : 'pos-red';
  const s = dollar >= 0 ? '+' : '-';
  return `<span class="${cls}">${s}$${Math.abs(Math.round(dollar)).toLocaleString()} (${s}${Math.abs(pct).toFixed(2)}%)</span>`;
}

function renderPerfBar(data) {
  if (!_histEquity) return;
  const equity = +(data?.account?.equity || 0);
  if (!equity) return;
  ['week','qtd','ytd'].forEach(k => {
    const base = _histEquity[k];
    if (base && base > 0) {
      const d = equity - base, p = d / base * 100;
      $('tb-' + k).innerHTML = fmtPerf(d, p);
    }
  });
}

async function loadPerfHistory() {
  try {
    const data = await apiJson('/api/lab/equity-baselines');
    const b = data.baselines || {};
    if (!Object.keys(b).length) return;  // no snapshots yet — accumulates over time
    _histEquity = {
      week: b.week?.equity || null,
      qtd:  b.qtd?.equity  || null,
      ytd:  b.ytd?.equity  || null,
    };
    if (_latestOverview) renderPerfBar(_latestOverview);
  } catch(e) { /* non-critical */ }
}

// ─── MAIN POLL ─────────────────────────────────────────────────────────────
let _prevRegime = null;
let _prevPosCount = null;

async function poll() {
  try {
    const data = await apiJson('/api/lab/overview');
    _latestOverview = data;
    renderTopbar(data);
    renderPositions(data);
    renderAlerts((data.alerts||[]));
    renderPerfBar(data);

    // Announce regime changes
    const regime = ((data.live_scores||{}).regime||'').toUpperCase();
    if (_prevRegime && regime && regime !== _prevRegime) {
      addFeedItem(`Regime changed: <b>${_prevRegime}</b> → <b>${regime}</b>.`, 'sys');
    }
    _prevRegime = regime || _prevRegime;

    // Announce position count changes
    const posCount = (data.accounting?.positions||[]).length;
    if (_initialized && _prevPosCount !== null && posCount !== _prevPosCount) {
      addFeedItem(`Position count: ${_prevPosCount} → ${posCount}.`, 'sys');
    }
    _prevPosCount = posCount;

    if (!_initialized) {
      _initialized = true;
      loadPerfHistory();
      if (!_feedRestored) {
        // Fresh load — add startup context messages
        const acct = data.account||{};
        const acctg = data.accounting||{};
        const bench = data.benchmark||{};
        const clock = data.clock||{};
        const riskState = acctg.risk_state||{};
        const equity = +(acct.equity||0);
        const lastEq = +(acct.adjusted_last_equity||acct.last_equity||equity);
        const pnl = equity - lastEq;
        const gross = +(acctg.gross_exposure_pct||0);
        const gap = +(bench.bot_vs_best||0);
        const qqxPnl = +(bench.best_index_pnl||0);
        const rsMsg = riskState.message||'';
        const rs = riskState.status||'ok';
        addFeedItem(
          `Equity <b>${fmt$(equity)}</b> · P&L today <b class="${pnl>=0?'pos-green':'pos-red'}">${fmtPnl(pnl)}</b> · `+
          `${gross.toFixed(1)}% deployed · market <b>${clock.is_open?'open':'closed'}</b>.`,
          'agent'
        );
        if (bench.ok) {
          const bestSym = bench.best_symbol || 'QQQ';
          const bestPct = +((bench.indices||{})[bestSym]?.change_pct||0);
          addFeedItem(
            `VS ${bestSym} <b class="${gap>=0?'pos-green':'pos-red'}">${fmtPnl(gap)}</b> — `+
            `${bestSym} was ${bestPct>=0?'up':'down'} ${Math.abs(bestPct).toFixed(2)}% today `+
            `(${fmtPnl(qqxPnl)} on a 100% position). You had ${gross.toFixed(0)}% deployed.`,
            'sys'
          );
        }
        if (rsMsg && rs !== 'normal' && rs !== 'ok' && rs !== 'research') {
          addFeedItem(`Risk: ${esc(rsMsg)}`, 'sys');
        }
      }
    }

    // Check options automation state
    const optAuto = (data.options||{}).automation_state||{};
    if (optAuto.last_summary && optAuto.last_summary !== window._lastOptSummary) {
      window._lastOptSummary = optAuto.last_summary;
      addFeedItem(`Options engine: ${esc(optAuto.last_summary)}`, 'sys');
    }

    if (_initialized) loadNews();

  } catch (e) {
    if (_initialized) addFeedItem(`Poll error: ${esc(e.message)}`, 'sys');
  }
}

// ─── NEWS ──────────────────────────────────────────────────────────────────
const _seenNewsIds = new Set();
let _lastNewsTs = 0;
const NEWS_INTERVAL_MS = 5 * 60 * 1000;

async function loadNews() {
  if (Date.now() - _lastNewsTs < NEWS_INTERVAL_MS) return;
  _lastNewsTs = Date.now();
  try {
    const data = await apiJson('/api/lab/news');
    // Only show positive/negative — neutral is noise
    const articles = (data.all_articles || [])
      .filter(a => a.tone !== 'neutral' && !_seenNewsIds.has(a.id))
      .slice(0, 8);
    for (const a of articles) {
      _seenNewsIds.add(a.id);
      const isNeg = a.tone === 'negative';
      const color = isNeg ? 'var(--red)' : 'var(--green)';
      const syms = (a.symbols||[]).slice(0,3).join(' · ');
      const headline = isNeg
        ? `<b style="color:var(--text)">${esc(a.headline)}</b>`
        : esc(a.headline);
      addFeedItem(
        `<span style="color:${color}">●</span> ` +
        (syms ? `<b>${esc(syms)}</b> — ` : '') +
        headline,
        'sys'
      );
    }
  } catch(e) { /* silent — news is informational */ }
}

// ─── CHAT ──────────────────────────────────────────────────────────────────
async function handleSend() {
  const inp = $('msg-input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  $('send-btn').disabled = true;
  addFeedItem(esc(text), 'you');
  showTyping();
  try {
    const data = await apiJson('/api/lab/chat/message', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({text:text, context:_latestOverview})
    });
    hideTyping();
    const reply = data.reply||data.response||data.message||'No response.';
    const orders = data.orders||null;
    let html = esc(reply).replace(/\*\*(.*?)\*\*/g,'<b>$1</b>');
    if (orders && orders.length) {
      html += `<div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
        <button style="height:26px;padding:0 10px;border-radius:4px;border:1px solid rgba(38,166,91,.4);background:rgba(38,166,91,.1);color:var(--green);font-size:11px;font-weight:700;cursor:pointer" onclick="acceptOrders(${JSON.stringify(orders).replace(/"/g,'&quot;')},this.parentElement)">Accept</button>
        <button style="height:26px;padding:0 10px;border-radius:4px;border:1px solid var(--border2);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer" onclick="this.parentElement.remove()">Dismiss</button>
      </div>`;
    }
    addFeedItem(html, 'agent');
  } catch (e) {
    hideTyping();
    addFeedItem(`Error: ${esc(e.message)}`, 'sys');
  }
  $('send-btn').disabled = false;
  $('msg-input').focus();
}

async function acceptOrders(orders, actionsEl) {
  if (actionsEl) actionsEl.innerHTML = '<span style="color:var(--muted);font-size:11px">Submitting…</span>';
  try {
    const data = await apiJson('/api/lab/orders/place',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({orders})
    });
    const filled = (data.submitted||[]).map(o=>`${(o.side||'').toUpperCase()} ${o.qty} ${o.symbol}`).join(', ');
    if (actionsEl) actionsEl.innerHTML = '<span style="color:var(--green);font-size:11px;font-weight:700">✓ Submitted</span>';
    addFeedItem(`Order placed: <b>${esc(filled||'see positions')}</b>.`, 'agent');
    setTimeout(poll, 1500);
  } catch(e) {
    if (actionsEl) actionsEl.innerHTML = `<span style="color:var(--red);font-size:11px">Failed: ${esc(e.message)}</span>`;
  }
}

$('msg-input').addEventListener('keydown', e => {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});

// ─── TRADING TOGGLE ────────────────────────────────────────────────────────
async function toggleTrading() {
  try {
    const endpoint = _paused ? '/api/lab/trader/resume' : '/api/lab/trader/pause';
    const data = await apiJson(endpoint, {method:'POST',headers:{'Content-Type':'application/json'},body:'{}' });
    _paused = !!data.paused;
    $('tb-pause').textContent = _paused ? 'Resume' : 'Pause';
    $('tb-pause').className = _paused ? 'paused' : '';
    addFeedItem(_paused ? 'Automation <b>paused</b>.' : 'Automation <b>resumed</b>.', 'sys');
  } catch(e) { addFeedItem(`Toggle error: ${esc(e.message)}`, 'sys'); }
}

// ─── OPTIONS AUTOMATION ────────────────────────────────────────────────────
async function runOptionsAutomation() {
  addFeedItem('Running options automation…', 'sys');
  try {
    const data = await apiJson('/api/lab/options/automation/run',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}' });
    const summary = data.summary || (data.action==='none'?'Nothing to do right now.':'Done.');
    addFeedItem(`Options engine: ${esc(summary)}`, 'agent');
    window._lastOptSummary = summary;
    setTimeout(poll, 1200);
  } catch(e) { addFeedItem(`Options error: ${esc(e.message)}`, 'sys'); }
}

// ─── STOCK DETAIL MODAL ────────────────────────────────────────────────────
function closeStockModal() { $('stock-modal').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key==='Escape') { closeStockModal(); closeBt(); }});

function showStockDetail(sym) {
  const scores = _latestOverview.live_scores||{};
  const all = [...(scores.top||[]),(scores.signals||[]),(scores.held_scores||[])].flat();
  const sig = all.find(s=>(s.symbol||'').toUpperCase()===sym.toUpperCase());
  if (!sig) { addFeedItem(`No signal data for ${esc(sym)}.`, 'sys'); return; }
  const q = sig.quote||{};
  const price = +(q.price||0);
  const chgPct = +(q.change_pct||0);
  const score = +(sig.score||0);
  const side = (sig.side||'buy').toUpperCase();
  const regime = sig.regime||'—';
  const bd = sig.signal_breakdown||{};
  const news = sig.news||[];
  const reasons = sig.technical_reasons||[];
  const minConv = +(((_latestOverview.model)||{}).min_conviction||63);
  const scoreCol = score>=80?'var(--green)':score>=minConv?'var(--amber)':'var(--muted)';
  const chgCol = chgPct>=0?'var(--green)':'var(--red)';
  $('smd-sym').innerHTML = `${esc(sym)} <span style="font-size:11px;color:${side==='BUY'?'var(--green)':'var(--red)'}">${side}</span>`;
  $('smd-meta').textContent = `${regime} regime`;
  $('smd-price').textContent = price>0?fmt$(price,2):'—';
  $('smd-chg').innerHTML = `<span style="color:${chgCol}">${chgPct>=0?'+':''}${chgPct.toFixed(2)}%</span>`;
  const indOrder = [{key:'rsi',name:'RSI'},{key:'macd',name:'MACD'},{key:'ema',name:'EMA'},{key:'avwap',name:'AVWAP'},{key:'trend',name:'Trend'},{key:'price_action',name:'P.Action'}];
  let bdHtml = `<div class="smd-lbl">Score <span style="color:${scoreCol}">${score}/100</span></div>`;
  for (const {key,name} of indOrder) {
    const ind = bd[key]; if (!ind) continue;
    const pts = +(ind.points||0), wt = +(ind.weight||0);
    const ptsCls = pts===wt?'pts-full':pts===0?'pts-zero':'pts-partial';
    bdHtml += `<div class="smd-ind-row"><span class="smd-dot ${ind.status||'neutral'}"></span><span class="smd-ind-name">${name}</span><span class="smd-ind-label">${esc(ind.label||'—')}</span><span class="smd-pts ${ptsCls}">${pts}/${wt}</span></div>`;
  }
  $('smd-breakdown').innerHTML = bdHtml;
  const newsEl = $('smd-news');
  if (news.length) {
    newsEl.style.display='';
    newsEl.innerHTML = `<div class="smd-lbl">News</div>`+news.slice(0,5).map(n=>{
      const ts = n.created_at?new Date(n.created_at).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:true}):'';
      return `<div class="smd-news-item"><div class="smd-news-headline">${esc(n.headline||'')}</div><div class="smd-news-meta"><span>${esc((n.source||'').toUpperCase())}</span><span>${ts}</span>${n.url?`<a class="smd-news-link" href="${n.url}" target="_blank" rel="noopener">Open ↗</a>`:''}</div></div>`;
    }).join('');
  } else { newsEl.style.display='none'; }
  const reasonsEl = $('smd-reasons');
  if (reasons.length) {
    reasonsEl.style.display='';
    reasonsEl.innerHTML = `<div class="smd-lbl">Signal factors</div>`+reasons.map(r=>`<div style="font-size:12px;padding:3px 0;color:var(--text)">· ${esc(r)}</div>`).join('');
  } else { reasonsEl.style.display='none'; }
  $('stock-modal').classList.add('open');
}

// ─── BACKTEST ──────────────────────────────────────────────────────────────
function openBacktestPanel() { $('bt-panel').classList.add('open'); }
function closeBt() { $('bt-panel').classList.remove('open'); }

async function runBacktest() {
  $('bt-result').innerHTML = '<div class="bt-spinner"></div>';
  try {
    const data = await apiJson('/api/lab/walkforward',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})});
    const r = data.result||data;
    $('bt-result').innerHTML = `<pre style="font-size:11px;line-height:1.6;color:var(--text);white-space:pre-wrap">${esc(JSON.stringify(r,null,2))}</pre>`;
  } catch(e) { $('bt-result').innerHTML = `<span style="color:var(--red)">Error: ${esc(e.message)}</span>`; }
}

// ─── POLL LOOP ─────────────────────────────────────────────────────────────
restoreFeed();
poll();
setInterval(poll, 20000);
</script>
