# ── CyberArk Conjur Secrets Provider — K8s Secret shell ──────────────────────
#
# The CyberArk Secrets Provider init container (added to deployment.yaml)
# authenticates to Conjur and populates this Secret's data before the main
# container starts. No plaintext credentials are ever stored in Git.
#
# Conjur secret paths (update to match your Conjur policy):
#   ALPACA_PAPER_KEY    → personal-secrets/alpaca/paper-key
#   ALPACA_PAPER_SECRET → personal-secrets/alpaca/paper-secret
#   GEMINI_API_KEY      → personal-secrets/google/gemini/api-key
#   NOTIFY_WEBHOOK_URL  → personal-secrets/alpaca/notify-webhook  (optional)
#
# Docs: https://docs.cyberark.com/secrets-provider-for-k8s
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: alpaca-trader-secrets
  namespace: alpaca-trader
  annotations:
    conjur.org/authn-identity: "host/alpaca-trader/alpaca-trader-sa"
    conjur.org/container-mode: "init"
    conjur.org/secrets-refresh-interval: "5m"

    # Map Conjur variable paths → K8s secret keys
    conjur.org/conjur-secrets.alpaca: |
      - ALPACA_PAPER_KEY: personal-secrets/alpaca/paper-key
      - ALPACA_PAPER_SECRET: personal-secrets/alpaca/paper-secret
      - GEMINI_API_KEY: personal-secrets/google/gemini/api-key
      - NOTIFY_WEBHOOK_URL: personal-secrets/alpaca/notify-webhook
type: Opaque
# data is populated at runtime by the Secrets Provider — leave empty
