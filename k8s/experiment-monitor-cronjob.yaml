apiVersion: batch/v1
kind: CronJob
metadata:
  name: alpaca-experiment-monitor
  namespace: alpaca-trader
  labels:
    app: alpaca-experiment-monitor
spec:
  # 17:15 ET — after the close AND after the learning agent's first post-close
  # cycle (hourly rate limit means it can run as late as ~17:00), so the daily
  # digest includes what was learned/adjusted today.
  schedule: "15 17 * * 1-5"
  timeZone: "America/New_York"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 180
      template:
        metadata:
          labels:
            app: alpaca-experiment-monitor
        spec:
          restartPolicy: Never
          serviceAccountName: alpaca-trader-sa
          containers:
            - name: monitor
              image: gcr.io/pure-tribute-440710-r8/alpaca-trader:latest
              imagePullPolicy: Always
              command: ["python", "experiment_monitor.py"]
              envFrom:
                - configMapRef:
                    name: alpaca-trader-config
                - secretRef:
                    name: alpaca-trader-secrets
              volumeMounts:
                - name: state
                  mountPath: /data/state
              resources:
                requests:
                  cpu: "50m"
                  memory: "96Mi"
                limits:
                  cpu: "250m"
                  memory: "192Mi"
          volumes:
            - name: state
              persistentVolumeClaim:
                claimName: alpaca-trader-state
