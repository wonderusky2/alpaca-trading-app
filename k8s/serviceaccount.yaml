# Service account for CyberArk Conjur Kubernetes authenticator.
# The Conjur policy must grant this SA access to the secrets below.
#
# In your Conjur policy, add:
#   - !host system:serviceaccount:alpaca-trader:alpaca-trader-sa
# and grant it read on the relevant secret paths.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alpaca-trader-sa
  namespace: alpaca-trader
  annotations:
    # If using Workload Identity for GCP (optional)
    # iam.gke.io/gcp-service-account: alpaca-trader@YOUR_PROJECT.iam.gserviceaccount.com
